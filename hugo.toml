baseURL = "https://fhbarton.com/"
title = "Finn-Henrik Barton"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableGitInfo = true

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Finn-Henrik Barton"
  description = "Economist interested in environment, urban, and spatial topics. Portfolio and blog."
  author = "Finn-Henrik Barton"
  DateFormat = "January 2, 2006"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
    favicon = "/img/social.png"

  [params.label]
    text = "Finn-Henrik Barton"

  [params.profileMode]
    enabled = false
    title = "Finn-Henrik Barton"
    subtitle = "Economist · Policy & Data · Environment, Urban & Spatial"
    imageUrl = "/img/avatar.png"
    imageWidth = 180
    imageHeight = 180
    imageTitle = "Finn-Henrik Barton"

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/blog"

    [[params.profileMode.buttons]]
      name = "About"
      url = "/about"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/finn-henrik-barton-53193214b/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/FinnHB"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/FhBarton"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:finn_henrik@hotmail.com"

  [[params.socialIcons]]
    name = "cv"
    url = "/files/cv.pdf"

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "github-dark"
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "cv"
  name = "CV"
  url = "/files/cv.pdf"
  weight = 40
